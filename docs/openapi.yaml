          --data "## New Name"
        ```
        
        Omitting the `#` characters entirely is valid too — it's how you deliberately remove a heading and demote its line to plain text — just make sure that's actually the intent before doing so.
        
        When a target is specified the target section is replaced with the request body and the full updated file content is returned with a `200` status. If the target does not exist it will be created. Without a target, the entire file is replaced and a `204` status is returned.
      parameters:
        - description: "Path to the relevant file (relative to your vault root).\n Optionally, you may include a reference to target a sub-part of the document; see \"Targeting a Sub-part of your Document\" for details."
          in: "path"
          name: "filename"
          required: true
          schema:
            format: "path"
            type: "string"
        - description: "If patch data already exists in Target, reject the patch?"
          in: "header"
          name: "Reject-If-Content-Preexists"
          required: false
          schema:
            default: "false"
            enum:
              - "true"
              - "false"
            type: "string"
        - description: "Trim whitespace from Target content before applying the operation?"
          in: "header"
          name: "Trim-Target-Whitespace"
          required: false
          schema:
            default: "false"
            enum:
              - "true"
              - "false"
            type: "string"
        - description: |
            Type of sub-document section to target. When specified, the operation
            applies only to the matching section rather than the whole file. Must
            be used together with the `Target` header.
            
            - `heading`: a markdown heading section.
            - `block`: a block reference.
            - `frontmatter`: a frontmatter field.
          in: "header"
          name: "Target-Type"
          required: false
          schema:
            enum:
              - "heading"
              - "block"
              - "frontmatter"
            type: "string"
        - description: |
            The section to target; required when `Target-Type` is specified.
            This value can be URL-Encoded and *must* be URL-Encoded if it
            includes non-ASCII characters.
          in: "header"
          name: "Target"
          required: false
          schema:
            type: "string"
        - description: "Delimiter used when specifying nested heading targets (e.g. \"Heading 1::Subheading\"). Defaults to \"::\"."
          in: "header"
          name: "Target-Delimiter"
          required: false
          schema:
            default: "::"
            type: "string"
      requestBody:
        content:
          "*/*":
            schema:
              type: "string"
          text/markdown:
            schema:
              example: |
                # This is my document
                
                something else here
              type: "string"
        description: "Content of the file you would like to upload."
        required: true
      responses:
        "200":
          content:
            text/markdown:
              schema:
                type: "string"
          description: "Success; targeted section replaced. The full updated file content is returned."
        "204":
          description: "Success; entire file replaced."
        "400":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: |
            Incoming file could not be processed.  Make sure you have specified a reasonable file name, and make sure you have set a reasonable 'Content-Type' header; if you are uploading a note, 'text/markdown' is likely the right choice.
        "405":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: |
            Your path references a directory instead of a file; this request method is valid only for updating files.
      summary: |
        Create a new file in your vault or update the content of an existing one.
      tags:
        - "Vault Files"
  "/vault/{pathToDirectory}/":
    get:
      parameters:
        - description: |
            Path to list files from (relative to your vault root).  Note that empty directories will not be returned.
            
            Note: this particular interactive tool requires that you provide an argument for this field, but the API itself will allow you to list the root folder of your vault. If you would like to try listing content in the root of your vault using this interactive tool, use the above "List files that exist in the root of your vault" form above.
          in: "path"
          name: "pathToDirectory"
          required: true
          schema:
            format: "path"
            type: "string"
      responses:
        "200":
          content:
            application/json:
              example:
                files:
                  - "mydocument.md"
                  - "somedirectory/"
              schema:
                properties:
                  files:
                    items:
                      type: "string"
                    type: "array"
                type: "object"
          description: "Success"
        "404":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: "Directory does not exist"
      summary: |
        List files that exist in the specified directory.
      tags:
        - "Vault Directories"
security:
  - apiKeyAuth: []
servers:
  - description: "HTTPS (Secure Mode)"
    url: "https://{host}:{port}"
    variables:
      host:
        default: "127.0.0.1"
        description: "Binding host"
      port:
        default: "27124"
        description: "HTTPS port"
  - description: "HTTP (Insecure Mode)"
    url: "http://{host}:{port}"
    variables:
      host:
        default: "127.0.0.1"
        description: "Binding host"
      port:
        default: "27123"
        description: "HTTP port"
tags:
  - name: "Vault Files"
  - name: "Active File"
  - name: "Periodic Notes"
  - name: "Vault Directories"
  - name: "Search"
  - name: "Commands"
  - name: "Open"
  - name: "System"
  - name: "MCP"
