  /search/:
    post:
      description: |
        Evaluates a provided query against each file in your vault.
        
        This endpoint supports multiple query formats.  Your query should be specified in your request's body, and will be interpreted according to the `Content-type` header you specify from the below options. Additional query formats may be added in the future.
        
        # JsonLogic (`application/vnd.olrapi.jsonlogic+json`)
        
        Accepts a JsonLogic query specified as JSON.  See [JsonLogic](https://jsonlogic.com/operations.html)'s documentation for information about the base set of operators available, but in addition to those operators the following operators are available:
        
        - `glob: [PATTERN, VALUE]`: Returns `true` if a string matches a glob pattern.  E.g.: `{"glob": ["*.foo", "bar.foo"]}` is `true` and `{"glob": ["*.bar", "bar.foo"]}` is `false`.
        - `regexp: [PATTERN, VALUE]`: Returns `true` if a string matches a regular expression.  E.g.: `{"regexp": [".*\.foo", "bar.foo"]` is `true` and `{"regexp": [".*\.bar", "bar.foo"]}` is `false`.
        
        Returns only non-falsy results.  "Non-falsy" here treats the following values as "falsy":
        
        - `false`
        - `null` or `undefined`
        - `0`
        - `[]`
        - `{}`
        
        Files are represented as an object having the schema described
        in the Schema named 'NoteJson' at the bottom of this page.
        Understanding the shape of a JSON object from a schema can be
        tricky; so you may find it helpful to examine the generated metadata
        for individual files in your vault to understand exactly what values
        are returned.  To see that, access the `GET` `/vault/{filePath}`
        route setting the header:
        `Accept: application/vnd.olrapi.note+json`.  See examples below
        for working examples of queries performing common search operations.
      requestBody:
        content:
          "application/vnd.olrapi.jsonlogic+json":
            examples:
              find_by_frontmatter_url_glob:
                summary: "Find notes having URL or a matching URL glob frontmatter field."
                value: |
                  {
                    "or": [
                      {"===": [{"var": "frontmatter.url"}, "https://myurl.com/some/path/"]},
                      {"glob": [{"var": "frontmatter.url-glob"}, "https://myurl.com/some/path/"]}
                    ]
                  }
              find_by_frontmatter_value:
                summary: "Find notes having a certain frontmatter field value."
                value: |
                  {
                    "==": [
                      {"var": "frontmatter.myField"},
                      "myValue"
                    ]
                  }
              find_by_tag:
                summary: "Find notes having a certain tag"
                value: |
                  {
                    "in": [
                      "myTag",
                      {"var": "tags"}
                    ]
                  }
            schema:
              externalDocs:
                url: "https://jsonlogic.com/operations.html"
              type: "object"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    filename:
                      description: "Path to the matching file"
                      type: "string"
                    result:
                      oneOf:
                        - type: "string"
                        - type: "number"
                        - items: {}
                          type: "array"
                        - type: "object"
                        - type: "boolean"
                  required:
                    - "filename"
                    - "result"
                  type: "object"
                type: "array"
          description: "Success"
        "400":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: |
            Bad request.  Make sure you have specified an acceptable
            Content-Type for your search query.
      summary: |
        Search for documents matching a specified search query
      tags:
        - "Search"
  /search/simple/:
    post:
      parameters:
        - description: "Your search query"
          in: "query"
          name: "query"
          required: true
          schema:
            type: "string"
        - description: "How much context to return around the matching string"
          in: "query"
          name: "contextLength"
          required: false
          schema:
            default: 100
            type: "number"
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    filename:
                      description: "Path to the matching file"
                      type: "string"
                    matches:
                      items:
                        properties:
                          context:
                            type: "string"
                          match:
                            properties:
                              end:
                                type: "number"
                              start:
                                type: "number"
                            required:
                              - "start"
                              - "end"
                            type: "object"
                        required:
                          - "match"
                          - "context"
                        type: "object"
                      type: "array"
                    score:
                      type: "number"
                  type: "object"
                type: "array"
          description: "Success"
      summary: |
        Search for documents matching a specified text query
      tags:
        - "Search"
  /tags/:
    get:
      description: |
        Returns all tags found across all files in the vault, drawn from both inline (`#tag`) and frontmatter tag syntax. Each tag is returned without the `#` prefix. Hierarchical tags (e.g. `work/tasks`) also contribute a count to every parent prefix (e.g. `work`), mirroring how Obsidian displays tag counts in its sidebar.
      responses:
        "200":
          content:
            application/json:
              example:
                tags:
                  - count: 3
                    name: "project"
                  - count: 1
                    name: "important"
                  - count: 2
                    name: "work"
                  - count: 2
                    name: "work/tasks"
              schema:
                properties:
                  tags:
                    items:
                      properties:
                        count:
                          description: "Number of times this tag is used across the vault."
                          type: "number"
                        name:
                          description: "Tag name without the leading `#`."
                          type: "string"
                      type: "object"
                    type: "array"
                type: "object"
          description: "A list of tags with their usage counts."
      summary: |
        Get a list of all tags with metadata.
      tags:
        - "Tags"
  /vault/:
    get:
      description: |
        Lists files in the root directory of your vault.
        
        Note: that this is exactly the same API endpoint as the below "List files that exist in the specified directory." and exists here only due to a quirk of this particular interactive tool.
      responses:
        "200":
          content:
            application/json:
              example:
                files:
                  - "mydocument.md"
                  - "somedirectory/"
              schema:
                properties:
                  files:
                    items:
                      type: "string"
                    type: "array"
                type: "object"
          description: "Success"
        "404":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: "Directory does not exist"
      summary: |
        List files that exist in the root of your vault.
      tags:
        - "Vault Directories"
  "/vault/{filename}":
    additionalOperations:
      move:
        description: |
          Moves a file from its current location to a new location specified in the Destination header. This operation preserves file history and updates internal links.
        parameters:
          - description: |
              The new path for the file, relative to your vault root. The path must not escape the vault root (relative segments like `..` are permitted as long as the resolved path remains inside the vault). Absolute paths (starting with `/`) are rejected. If the path ends with a trailing slash, the source filename is preserved and the file is placed in that directory (e.g. "archive/" moves "notes/todo.md" to "archive/todo.md"). If the path contains non-ASCII characters (e.g. accented letters), percent-encode the value (e.g. `r%C3%A9sum%C3%A9.md` for `résumé.md`).
            in: "header"
            name: "Destination"
            required: true
            schema:
              format: "path"
              type: "string"
          - description: |
              If "true", the move proceeds even when a file already exists at the destination. Defaults to "false", which returns a 409 if the destination exists.
            in: "header"
            name: "Allow-Overwrite"
            required: false
            schema:
              default: "false"
              enum:
                - "true"
                - "false"
              type: "string"
          - description: "Path to the relevant file (relative to your vault root).\n Optionally, you may include a reference to target a sub-part of the document; see \"Targeting a Sub-part of your Document\" for details."
            in: "path"
            name: "filename"
            required: true
            schema:
              format: "path"
              type: "string"
        responses:
          "204":
            description: "File successfully moved."
            headers:
              Content-Location:
                description: "The vault-relative path of the file at its new location (e.g. `archive/file.md`). Non-ASCII characters are percent-encoded."
                schema:
                  type: "string"
          "400":
            content:
              application/json:
                schema:
                  "$ref": "#/components/schemas/Error"
            description: |
              Bad request - Missing Destination header, malformed percent-encoding, or path escapes the vault root (e.g. starts with "/").
          "404":
            content:
              application/json:
                schema:
                  "$ref": "#/components/schemas/Error"
            description: "Source file does not exist."
          "405":
            content:
              application/json:
                schema:
                  "$ref": "#/components/schemas/Error"
            description: |
              Your path references a directory instead of a file; this request method is valid only for files.
          "409":
            content:
              application/json:
                schema:
                  "$ref": "#/components/schemas/Error"
            description: "Destination file already exists."
        summary: |
          Move a file to a new location in your vault.
        tags:
          - "Vault Files"
    delete:
      parameters:
        - description: "Path to the relevant file (relative to your vault root).\n Optionally, you may include a reference to target a sub-part of the document; see \"Targeting a Sub-part of your Document\" for details."
          in: "path"
          name: "filename"
          required: true
          schema:
            format: "path"
            type: "string"
      responses:
        "204":
          description: "Success"
        "404":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: "File does not exist."
        "405":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: |
            Your path references a directory instead of a file; this request method is valid only for updating files.
      summary: |
        Delete a particular file in your vault.
      tags:
        - "Vault Files"
    get:
      description: |
        Returns the content of the file at the specified path in your vault should the file exist.
        
        # Targeting a Sub-part of your Document
        
        You can operate on a specific section of a note instead of the whole file by providing `Target-Type` and `Target` headers:
        
        - Set `Target-Type` to `heading`, `block`, or `frontmatter`. When `Target-Type` is `heading`, the operation applies to the body content *beneath* that heading line — the heading line itself (`## My Section`) is not part of the section and should not appear in the patched content.
        - Set `Target` to the name of the heading, block reference, or frontmatter field. If the target contains non-ASCII characters (e.g. accented letters), percent-encode the value (e.g. `H%C3%A9llo` for `Héllo`).
        - For nested headings, use the `Target-Delimiter` header (default `::`) to separate levels.
        
        You can also embed the target type and target directly in the URL path after the note identifier instead of using headers. The segment immediately following the note identifier is the target type, and the remaining segments form the target:
        
        - `.../heading/My%20Section` is equivalent to supplying `Target-Type: heading` and `Target: My%20Section`.
        - For nested headings, add additional path segments: `.../heading/My%20Section/Subsection` is equivalent to `Target: My%20Section::Subsection`.
        - `.../frontmatter/fieldName` targets the `fieldName` frontmatter field.
        - `.../block/abc123` targets the block with reference ID `abc123`.
        
        Do not combine URL-embedded targeting with `Target-Type`, `Target`, or `Target-Delimiter` headers in the same request. If both are provided, the request fails with `422 ConflictingTargetSpecification`.
        
        ## Target-Scope
        
        For `heading` and `block` targets, the optional `Target-Scope` header controls which portion of the target the operation acts on:
        
        - `content` (default): the operation applies to the content region — the area beneath the heading line or at the block, leaving the heading/block-ID token unchanged.
        - `marker`: the operation applies only to the heading line or block-ID token itself, leaving the content unchanged. Useful for renaming a heading in-place with a `replace` operation without touching the section content.
        - `markerAndContent`: the operation applies to the full range covering both the heading/block-ID token and its content, allowing them to be replaced or repositioned together.
        
        ### Renaming a heading
        
        Unlike the `content` scope (where the heading line `## My Section` must *not* appear in the patched content), the `marker` and `markerAndContent` scopes target the heading line itself — `#` characters included. To rename a heading, the replacement content must include the same number of leading `#` characters as the original, or the heading will be silently demoted to a plain paragraph.
        
        The heading's depth isn't shown directly anywhere — the document map (`vault_get_document_map`, or a GET with `Accept: application/vnd.olrapi.document-map+json`) lists heading paths, not raw markdown, so depth must be inferred from the path length. The map returns each heading as an array, so its depth is the array length: `["Heading 1", "Subheading"]` is 2 deep, so its marker line is `## Subheading`. (With `Markdown-Patch-Version: 1` the same path is the `::`-joined string `Heading 1::Subheading`, and depth is the number of `Target-Delimiter`-separated segments.) Renaming it means replacing with content like `## New Name` — not just `New Name`.
        
        ```
        # Rename "## Subheading" to "## New Name" (note the leading "##")
