    get:
      description: |
        Returns the content of the current periodic note for the specified period.
        
        # Targeting a Sub-part of your Document
        
        You can operate on a specific section of a note instead of the whole file by embedding a target in the URL path, immediately after the note identifier. The first segment after the note is the target type, and the remaining segments address the target:
        
        - `.../heading/My%20Section` targets the section beneath the `My Section` heading — the body content below the heading line.
        - For a nested heading, add one path segment per level: `.../heading/My%20Section/Subsection` targets `Subsection` under `My Section`. Because each level is its own segment, a heading whose text contains `::` (or any other delimiter) needs no escaping.
        - `.../block/abc123` targets the block with reference ID `abc123`.
        - `.../frontmatter/fieldName` targets the `fieldName` frontmatter field.
        
        Percent-encode any segment that contains non-ASCII characters or a literal `/` (e.g. `H%C3%A9llo` for `Héllo`).
        
        If a document has a duplicate sibling heading (the same text repeated under the same parent) or a duplicate block reference ID, only the first occurrence is addressable by its plain text/id. Each later occurrence gets its own address with a non-printable marker suffix appended by the server — fetch the document map (`Accept: application/vnd.olrapi.document-map+json`) and copy that occurrence's key verbatim; don't try to type or reconstruct the marker yourself.
        
        `GET` returns just the addressed section. `PUT` replaces it and `POST` appends to it, with heading levels normalized and separator whitespace managed for you. `PATCH` also accepts a URL target — its raw-content mode — with the operation and other instruction fields in headers (`Operation`, `Target-Scope`, …) and the raw payload as the body. For the full instruction algebra (renames, moves, deletes, typed frontmatter values), see the PATCH documentation.
        
        On `PUT` and `POST`, the `Content-Type` of your request body selects how the payload is interpreted, and not every target accepts both:
        
        - A `text/markdown` body is literal markdown. Valid for `heading` and `block` targets. On a `frontmatter` target it is stored as the field's plain string value.
        - An `application/json` body is structured data. On a `block` target that addresses a table, it is a 2-D array of row cells (`[["Chicago", "16"]]`). On a `frontmatter` target it is the field's typed value (a list, dictionary, number, or string). A `heading` target has no structured form — its body is markdown text — so a JSON body there is rejected with `400 InvalidPatchInstruction` rather than being stringified into your note.
        
        ## Deprecated: header-based targeting
        
        Earlier releases addressed a sub-part with `Target-Type`, `Target`, and `Target-Delimiter` request headers (plus `Target-Scope` and `Trim-Target-Whitespace`) rather than URL path segments. **That form is deprecated and will be removed in 6.0.** It is only processed when you also send `Markdown-Patch-Version: 1`, and responses served that way carry a `Deprecation: true; sunset-version="6.0"` header. On GET/PUT/POST, supplying those targeting headers without that version is rejected with `400 HeaderTargetingRequiresVersion1` — reach the sub-part with URL path segments instead. (On PATCH, `Target-Type`/`Target` headers also have a *non-deprecated* meaning under an explicit `Markdown-Patch-Version: 2` — raw-content mode, with a different `Target` encoding; see the PATCH documentation.) Supplying both URL-path targeting and the header form in one request fails with `422 ConflictingTargetSpecification`.
        
        # Retrieving Document Metadata
        
        ## Metadata
        
        If you specify the header `Accept: application/vnd.olrapi.note+json`, will return a JSON representation of your note including parsed tag and frontmatter data as well as filesystem metadata.
        
        ## Document Map
        
        If you specify the header `Accept: application/vnd.olrapi.document-map+json`, will return a JSON object outlining what PATCH targets exist. See "responses" below for details.
      parameters:
        - description: "The name of the period for which you would like to grab a periodic note."
          in: "path"
          name: "period"
          required: true
          schema:
            default: "daily"
            enum:
              - "daily"
              - "weekly"
              - "monthly"
              - "quarterly"
              - "yearly"
            type: "string"
        - description: |
            Selects which markdown-patch format governs this request. You do not normally
            need to send this header. By default (2.0), a PATCH carries its whole instruction
            in the JSON request body, the document map returns a nested heading tree plus a
            `version` token, and a sub-part of a document is targeted with URL path elements
            (e.g. `.../heading/My%20Section`). Set it to `1` to opt into the deprecated 1.x
            behavior: the header-driven PATCH format, header-based targeting
            (`Target-Type`/`Target`/`Target-Delimiter`/`Target-Scope`) on GET/PUT/POST, and
            the `::`-joined document map. Responses served by 1.x carry a
            `Deprecation: true; sunset-version="6.0"` header. Any value other than `1` or `2`
            returns `400 InvalidPatchVersionHeader`.
            
            One place an *explicit* `2` matters: PATCH's raw-content mode with header-based
            targeting. Because `Target-Type`/`Target` headers on a PATCH are ambiguous between
            the 1.x format and raw-content mode, a PATCH carrying them without this header is
            rejected with `400 PatchHeaderTargetingRequiresExplicitVersion` — send `1` for the
            deprecated engine or `2` for raw-content mode. On GET/PUT/POST, supplying those
            targeting headers without `1` is rejected with `400 HeaderTargetingRequiresVersion1`
            (use URL path elements instead), and PATCH URL-element targeting likewise needs no
            version header.
          in: "header"
          name: "Markdown-Patch-Version"
          required: false
          schema:
            default: "2"
            enum:
              - "1"
              - "2"
            type: "string"
      responses:
        "200":
          content:
            application/json:
              description: "Returned when the URL path targets a frontmatter field (`.../frontmatter/fieldName`); the JSON value of that field."
              schema: {}
            "application/vnd.olrapi.document-map+json":
              schema:
                description: |
                  The document map. To receive the deprecated 1.x shape — heading paths as
                  `::`-joined strings, block ids prefixed with `^`, and no `version` —
                  send `Markdown-Patch-Version: 1`.
                properties:
                  blocks:
                    description: "Block reference ids, bare (no leading `^`), in document order."
                    example:
                      - "blockref1"
                      - "anotherBlockRef"
                    items:
                      type: "string"
                    type: "array"
                  frontmatterFields:
                    example:
                      - "title"
                      - "tags"
                      - "dateCreated"
                    items:
                      type: "string"
                    type: "array"
                  headings:
                    "$ref": "#/components/schemas/HeadingTree"
                  version:
                    description: "Content-hash token for the file; pass it back as a PATCH `ifMatch` to make an edit conditional on the file being unchanged."
                    example: "a1b2c3"
                    type: "string"
                type: "object"
            "application/vnd.olrapi.note+json":
              schema:
                "$ref": "#/components/schemas/NoteJson"
            text/markdown:
              schema:
                example: |
                  # This is my document
                  
                  something else here
                type: "string"
          description: "Success"
          headers:
            Content-Location:
              description: "Vault-relative path of the file that was acted on, e.g. `notes/file.md`. Non-ASCII characters are percent-encoded."
              schema:
                example: "notes/file.md"
                type: "string"
        "400":
          description: "The `Markdown-Patch-Version` header was invalid (not `1` or `2`)."
        "404":
          description: "File or target section does not exist"
      summary: |
        Get current periodic note for the specified period.
      tags:
        - "Periodic Notes"
    patch:
      description: |
        Modifies the current periodic note for the specified period with a single structured instruction: an operation applied to a scope of a target — a heading, block reference, or frontmatter field within that document.
        
        Edit a document with a single structured instruction — an **operation** applied to a **scope** of a **target** node (a heading, block reference, or frontmatter field). By default the whole instruction travels as a JSON request body; [raw-content mode](#raw-content-mode-templating-friendly) instead carries the instruction's fields in URL path elements/headers with the raw payload as the body.
        
        > **Migrating from the header-driven format?** See [Deprecated: the 1.x header-driven format](#deprecated-the-1x-header-driven-format) at the end.
        
        # The algebra
        
        - **operation** — `replace`, `prepend`, `append`, or `delete`.
        - **scope** (optional, default `content`):
          - `content` — the node's body. For a heading, that's its whole subtree *below* the heading line.
          - `marker` — the label only: a heading line, a block `^id`, or a frontmatter key. `replace` renames it.
          - `markerAndContent` — the marker *and* the body together: for a heading, its heading line plus everything beneath it. Unlike `content`, the heading line is inside the edited span, so a `replace` here rewrites the heading itself. `prepend`/`append` insert a *sibling* before/after it.
          - `parent` — a heading's place in the tree. Valid only with `replace`, and carries a `destination` (a **move**).
        - **target** — for a heading, an array of heading texts from the top level down (`["Overview","Details"]`), or `null`/`[]` for the document root; for a block, the bare id without `^`; for a frontmatter field, the key.
        - **payload** — carried in exactly one field, chosen by what it is:
          - `content` — a markdown/text string (heading & block bodies/labels, or a frontmatter key rename).
          - `value` — arbitrary JSON (frontmatter values).
          - `destination` — where a moved heading lands.
        
        Not every combination is meaningful; invalid ones are rejected with a `400`.
        
        **Relative heading levels.** Heading `#`-counts inside a `content` string are *relative* to the edited span, so you never count `#`s: under `content` scope a leading `#` becomes a direct child of the target; under `markerAndContent` (or a sibling insert) it lands at the target's own level. Nesting inside your content is preserved as you wrote it — replacing a `##` section with `# New\n\n## Child` yields `## New` and `### Child`. A level rebased past `######` (h6) is still written, but the response carries a `heading-depth-overflow` entry in the `Markdown-Patch-Warnings` header — percent-encoded JSON, since a warning message embeds document text verbatim and header values must be ASCII; run it through `decodeURIComponent` before parsing.
        
        > **Note:** because the heading line is part of the `markerAndContent` span, a `replace` whose content has *no* heading removes it — the section is dissolved into a plain paragraph. Include a leading `#` (at any depth; it is rebased for you) to keep it a heading.
        
        # How to Use & Examples
        
        All of the below examples assume you have a document that looks like this:
        
        ```markdown
        ---
        alpha: 1
        beta: test
        delta:
        zeta: 1
        yotta: 1
        gamma:
        - one
        - two
        ---
        
        # Heading 1
        
        This is the content for heading one
        
        Also references some [[#^484ef2]]
        
        ## Subheading 1:1
        Content for Subheading 1:1
        
        ### Subsubheading 1:1:1
        
        ### Subsubheading 1:1:2
        
        Testing how block references work for a table.[[#^2c7cfa]]
        Some content for Subsubheading 1:1:2
        
        More random text.
        
        ^2d9b4a
        
        ## Subheading 1:2
        
        Content for Subheading 1:2.
        
        some content with a block reference ^484ef2
        
        ## Subheading 1:3
        | City         | Population |
        | ------------ | ---------- |
        | Seattle, WA  | 8          |
        | Portland, OR | 4          |
        
        ^2c7cfa
        ```
        
        ## Append, prepend, or replace content below a heading
        
        To append the content "Hello" below "Subsubheading 1:1:1" under "Heading 1":
        
        ```json
        {
          "targetType": "heading",
          "target": ["Heading 1", "Subheading 1:1", "Subsubheading 1:1:1"],
          "operation": "append",
          "content": "Hello"
        }
        ```
        
        `prepend` and `replace` work the same way, with different results. Because `target` is an array, a heading whose text contains `::` needs no escaping.
        
        > **Note:** the heading line itself is not part of the `content` scope. When you `replace` a heading's content, supply only the body — do not include the heading line, or it will be duplicated. To rename the heading, see below.
        
        ## Renaming a heading
        
        Give the new text. That's all — no `#` characters, and nothing to look up:
        
        ```json
        {
          "targetType": "heading",
          "target": ["Heading 1", "Subheading 1:1"],
          "operation": "replace",
          "scope": "marker",
          "content": "New Name"
        }
        ```
        
        `marker` scope addresses the label rather than the line, so the heading keeps whatever level it had and the body underneath is untouched. You never need to know the heading's depth to rename it.
        
        > **Do not include `#` characters here.** They are not stripped — they become part of the heading text, so `"## New Name"` renames the heading to `## New Name` and renders as `## ## New Name`. (This is the reverse of the deprecated 1.x format, where the `#`s were required. If you are migrating, drop them.)
        
        The same instruction shape renames a block id (`targetType: "block"`, new id without `^`) or a frontmatter key (`targetType: "frontmatter"`, new key name in `content`).
        
        ## Whitespace is spliced verbatim
        
        Your `content` is inserted exactly as written at one edge of the target's span; the API adds no whitespace of its own. For a heading, that span begins immediately *after* the heading line and ends after the last line of its subtree. Given a document containing:
        
        ```markdown
        # One
        
        body of one
        ```
        
        - `prepend` lands flush against the heading line → `# One\nX\n\nbody of one\n`
        - `append` lands flush against the section's last line → `# One\n\nbody of one\nX\n`
        - `replace` clears the whole span, blank line included → `# One\nX\n`
        
        In all three cases **a leading `\n` in your content is what buys you a blank line before it**. Sending `"\nX\n"` instead gives `# One\n\nX\n\nbody of one\n`, `# One\n\nbody of one\n\nX\n`, and `# One\n\nX\n` respectively.
        
        Note that this is a *leading* newline even for `append`: the gap you usually want is between the existing text and yours, and that edge comes first. Trailing newlines control the gap *after* your content, and are trimmed at the very end of a document — so padding the end of an `append` at the end of a file does nothing.
        
        The case that most often surprises: prepending into a section whose heading is already followed by a blank line still yields `# One\nX`, with no gap. That blank line is part of the body, not of the boundary, so it is pushed below your text rather than kept above it.
        
        ## Append, prepend, or replace content of a block reference
        
        To append "Hello" below the block referenced by `2d9b4a`:
        
        ```json
        { "targetType": "block", "target": "2d9b4a", "operation": "append", "content": "Hello" }
        ```
        
        ## Append, prepend, or replace table rows via a block reference
        
        To add a new city/population pair to the table referenced by `2c7cfa`, pass the row(s) as a 2-D JSON array in `value`:
        
        ```json
        { "targetType": "block", "target": "2c7cfa", "operation": "append", "value": [["Chicago, IL", "16"]] }
        ```
        
        `prepend` puts the new row first (right below the heading row); `replace` swaps all body rows for the ones you supply. Each row must have exactly as many cells as the table has columns; a mismatched row, or targeting a block that isn't a table, is rejected.
        
        ## Setting a frontmatter field
        
        Frontmatter values are JSON, so they ride in `value` (not `content`). To set `alpha` to `2`:
        
        ```json
        { "targetType": "frontmatter", "target": "alpha", "operation": "replace", "value": 2 }
        ```
        
        Add `"createTargetIfMissing": true` to create a field that might not exist yet. For `append`/`prepend`, `value` is merged into the existing value (list concat, dict merge, string concat).
        
        ## Adding and removing tags
        
        Obsidian stores frontmatter tags in the `tags` field. To add `project/active`, merging into the list and creating it if absent:
        
        ```json
        { "targetType": "frontmatter", "target": "tags", "operation": "append", "value": ["project/active"], "createTargetIfMissing": true }
        ```
        
        There is no direct "remove item" operation. To remove a tag, read the current list (GET, or `vault_read` in the MCP API), filter it client-side, and replace the whole field:
        
        ```json
        { "targetType": "frontmatter", "target": "tags", "operation": "replace", "value": ["remaining-tag-1", "remaining-tag-2"] }
        ```
        
        ## Moving a heading section
        
        `scope: "parent"` with `operation: "replace"` re-parents (and re-levels) a section. To move "Details" under "Appendix" as its last child:
        
        ```json
        {
          "targetType": "heading",
          "target": ["Overview", "Details"],
          "operation": "replace",
          "scope": "parent",
          "destination": { "parent": ["Appendix"], "place": "last" }
        }
        ```
        
        `place` may be `"first"`, `"last"`, `{ "before": <heading path> }`, or `{ "after": <heading path> }`. Use `"parent": null` to move to the document root.
        
        ## Deleting
        
        `operation: "delete"` empties the `content` scope, removes the whole subtree (`markerAndContent`), or dissolves just the heading line (`marker`):
        
        ```json
        { "targetType": "heading", "target": ["Heading 1", "Subheading 1:2"], "operation": "delete", "scope": "markerAndContent" }
        ```
        
        ## Optimistic concurrency
        
        Pass `ifMatch` with the `version` token from a document map (see below). If the file changed since, the patch fails with `412` and the file is untouched — refetch and retry.
        
        ## Identifying patch targets in a file
        
        Issue a GET request to `/vault/{path}` with an `Accept` header of `application/vnd.olrapi.document-map+json` to get the headings, block references, and frontmatter fields present in the file (and its `version` token). If a heading has a duplicate sibling (same text, same parent) or a block reference ID repeats, only the first occurrence keeps its plain-text/id key — each later occurrence's key carries a non-printable marker suffix; copy it verbatim from the map into `target` rather than typing it by hand. See "Targeting a Sub-part of your Document" for details.
        
        # Raw-content mode (templating-friendly)
        
        Putting the whole instruction in a JSON body has one sharp edge: the `content` string must be JSON-escaped, which tools that *template* markdown into an HTTP body (Shortcuts, Tasker, curl with `--data` from a template) often cannot do reliably. Raw-content mode removes that requirement: the instruction's fields travel **outside** the body, and the body is the raw payload, spliced verbatim.
        
        The target can ride in either of two places (never both — that's a `422`):
        
        - **URL path elements**, exactly as GET/PUT/POST use them: `PATCH /vault/note.md/heading/A/B`. No version header needed.
        - **`Target-Type` / `Target` headers**, together with an explicit `Markdown-Patch-Version: 2`. The `Target` encoding is type-dependent, mirroring the instruction's `target` field: a heading Target is **JSON, percent-encoded** — `["A","B"]` sent as `%5B%22A%22%2C%22B%22%5D`, or `null` for the document root — while block and frontmatter Targets are the plain id/key (percent-encoded if non-ASCII). Because `Target` headers on a PATCH are ambiguous with the deprecated 1.x format, omitting the version header fails loudly with `400 PatchHeaderTargetingRequiresExplicitVersion` rather than guessing.
        
        The remaining fields map to headers: `Operation` (required), `Target-Scope` (all four scopes, including `parent`), `Create-Target-If-Missing`, `Reject-If-Content-Preexists`, `If-Match` (the document-map `version` token, bare or ETag-quoted), and `Destination` (a move's destination object as percent-encoded JSON). The 1.x-only `Target-Delimiter` and `Trim-Target-Whitespace` headers are rejected.
        
        The body is the payload carrier, chosen by its content type:
        
        | Body | Instruction field |
        | --- | --- |
        | `text/markdown` (any `text/*`) | `content` |
        | `application/json` | `value` |
        | *(no body)* | none — a `delete`, or a move via `Destination` |
        
        An empty body deliberately maps to *no* carrier: a `replace` with an accidentally-empty template fails as a missing carrier instead of clearing the section. To clear content on purpose, use an instruction body with `"content": ""`.
        
        ```sh
        # Append a templated line under a heading — no JSON escaping anywhere
        curl -k -X PATCH \
          -H "Authorization: Bearer $API_KEY" \
          -H "Operation: append" \
          -H "Content-Type: text/markdown" \
          --data "- $TEMPLATED_CONTENT" \
          "https://127.0.0.1:27124/vault/notes/daily.md/heading/Log"
        
        # The same edit with header targeting (note the explicit version and JSON Target)
        curl -k -X PATCH \
          -H "Authorization: Bearer $API_KEY" \
          -H "Markdown-Patch-Version: 2" \
          -H "Target-Type: heading" \
          -H "Target: %5B%22Log%22%5D" \
          -H "Operation: append" \
          -H "Content-Type: text/markdown" \
          --data "- $TEMPLATED_CONTENT" \
          "https://127.0.0.1:27124/vault/notes/daily.md"
        ```
        
        Everything downstream is identical to instruction mode: the same validation, the same warnings header, the same error mapping. A raw-mode request may also send `application/vnd.olrapi.patch-instruction+json` — but only as a *whole-instruction body* with no targeting elsewhere; combining it with URL or header targeting is a `422 ConflictingTargetSpecification`.
        
        > **Note:** on `/active/` and `/periodic/` endpoints, a URL suffix (e.g. `/active/heading/Log`) previously had no effect on PATCH — it was ignored and the whole file was patched. It now targets the addressed section, matching PUT/POST.
        
        # Deprecated: the 1.x header-driven format
        
        The earlier PATCH format spread the instruction across `Operation`, `Target-Type`, `Target`, `Target-Delimiter`, `Target-Scope`, `Create-Target-If-Missing`, `Reject-If-Content-Preexists`, and `Trim-Target-Whitespace` headers, with the payload in a `text/markdown` (or JSON-string) body. **It is deprecated and will be removed in 6.0.** Requests that use it still work, but every response carries a `Deprecation: true; sunset-version="6.0"` header.
        
        The JSON-instruction format described above is the default. To use the deprecated format, send `Markdown-Patch-Version: 1`; the header also selects the 1.x document map (`::`-joined heading paths, no `version`) on GET. Without any version header, a non-object body with no targeting is rejected with `400 InvalidPatchInstruction`, and `Target-Type`/`Target` headers are rejected with `400 PatchHeaderTargetingRequiresExplicitVersion` — those same header names are also raw-content mode's (with different `Target` encoding), so the request must explicitly pick `1` or `2`. To upgrade, drop the version header and either move each 1.x header into the JSON body as below, or switch to [raw-content mode](#raw-content-mode-templating-friendly) and keep your body as-is:
        
        | 1.x header | Instruction field |
        | --- | --- |
        | `Operation: append` | `"operation": "append"` (now also `"delete"`) |
        | `Target-Type: heading` | `"targetType": "heading"` |
        | `Target: A::B` (+ `Target-Delimiter`) | `"target": ["A", "B"]` (a real array — no delimiter) |
        | `Target-Scope: content` | `"scope": "content"` (adds `"parent"` for moves) |
        | body (`text/markdown`) | `"content": "..."` |
        | body (`application/json` value) | `"value": <json>` |
        | `Create-Target-If-Missing: true` | `"createTargetIfMissing": true` |
        | `Reject-If-Content-Preexists: true` | `"rejectIfContentPreexists": true` |
        | `Trim-Target-Whitespace` | *(dropped; the engine owns boundary whitespace)* |
      parameters:
        - description: "The name of the period for which you would like to grab a periodic note."
          in: "path"
          name: "period"
          required: true
          schema:
            default: "daily"
            enum:
              - "daily"
              - "weekly"
              - "monthly"
              - "quarterly"
              - "yearly"
            type: "string"
        - description: |
            Selects which markdown-patch format governs this request. You do not normally
            need to send this header. By default (2.0), a PATCH carries its whole instruction
            in the JSON request body, the document map returns a nested heading tree plus a
            `version` token, and a sub-part of a document is targeted with URL path elements
            (e.g. `.../heading/My%20Section`). Set it to `1` to opt into the deprecated 1.x
            behavior: the header-driven PATCH format, header-based targeting
            (`Target-Type`/`Target`/`Target-Delimiter`/`Target-Scope`) on GET/PUT/POST, and
            the `::`-joined document map. Responses served by 1.x carry a
            `Deprecation: true; sunset-version="6.0"` header. Any value other than `1` or `2`
            returns `400 InvalidPatchVersionHeader`.
            
            One place an *explicit* `2` matters: PATCH's raw-content mode with header-based
            targeting. Because `Target-Type`/`Target` headers on a PATCH are ambiguous between
            the 1.x format and raw-content mode, a PATCH carrying them without this header is
            rejected with `400 PatchHeaderTargetingRequiresExplicitVersion` — send `1` for the
            deprecated engine or `2` for raw-content mode. On GET/PUT/POST, supplying those
            targeting headers without `1` is rejected with `400 HeaderTargetingRequiresVersion1`
            (use URL path elements instead), and PATCH URL-element targeting likewise needs no
            version header.
          in: "header"
          name: "Markdown-Patch-Version"
          required: false
          schema:
            default: "2"
            enum:
              - "1"
              - "2"
            type: "string"
        - description: |
            Raw-content mode: the type of node the instruction targets (`heading`,
            `block`, or `frontmatter`). Must be used together with the `Target`
            header and an explicit `Markdown-Patch-Version: 2`; alternatively, put
            the target in the URL path (`.../heading/A/B`) and omit both headers.
            Supplying both is rejected with `422 ConflictingTargetSpecification`.
          in: "header"
          name: "Target-Type"
          required: false
          schema:
            enum:
              - "heading"
              - "block"
              - "frontmatter"
            type: "string"
        - description: |
            Raw-content mode: the node the instruction targets. The encoding is
            type-dependent, mirroring the instruction's `target` field. For a
            `heading`, the value is JSON — an array of heading texts from the top
            level down, or `null` for the document root — then percent-encoded:
            `["A","B"]` is sent as `%5B%22A%22%2C%22B%22%5D`. For a `block` or
            `frontmatter` target, the value is the plain id/key, percent-encoded if
            it contains non-ASCII characters. A heading value that does not decode
            to JSON (e.g. a bare 1.x-style `A::B` path) is rejected with
            `400 InvalidTargetHeader`.
          in: "header"
          name: "Target"
          required: false
          schema:
            type: "string"
        - description: |
            Raw-content mode: the instruction's operation. Required whenever the
            target rides in the URL path or the `Target-Type`/`Target` headers.
          in: "header"
          name: "Operation"
          required: false
          schema:
            enum:
              - "replace"
              - "prepend"
              - "append"
              - "delete"
            type: "string"
        - description: |
            Raw-content mode: the instruction's `scope` — `content` (default),
            `marker`, `markerAndContent`, or `parent` (a move; carries its
            destination in the `Destination` header). See the instruction-body
            documentation for what each scope addresses.
          in: "header"
          name: "Target-Scope"
          required: false
          schema:
            default: "content"
            enum:
              - "content"
              - "marker"
              - "markerAndContent"
              - "parent"
            type: "string"
        - description: |
            Raw-content mode: where a moved heading lands (`Target-Scope: parent`).
            The instruction's `destination` object as JSON, then percent-encoded:
            `{"parent":["Appendix"],"place":"last"}` is sent as
            `%7B%22parent%22%3A%5B%22Appendix%22%5D%2C%22place%22%3A%22last%22%7D`.
            A move carries no body.
          in: "header"
          name: "Destination"
          required: false
          schema:
            type: "string"
        - description: |
            Raw-content mode: the instruction's `ifMatch` optimistic-concurrency
            token — the `version` from a document map, bare or wrapped in one pair
            of double quotes (RFC 9110 ETag style). A mismatch fails with `412` and
            leaves the file untouched.
          in: "header"
          name: "If-Match"
          required: false
          schema:
            type: "string"
        - description: "If the specified Target does not exist, create it?"
          in: "header"
          name: "Create-Target-If-Missing"
          required: false
          schema:
            default: "false"
            enum:
              - "true"
              - "false"
            type: "string"
        - description: "If patch data already exists in Target, reject the patch?"
          in: "header"
          name: "Reject-If-Content-Preexists"
          required: false
          schema:
            default: "false"
            enum:
              - "true"
              - "false"
            type: "string"
      requestBody:
        content:
          application/json:
            examples:
              addTag:
                summary: "Add a tag (merge into the tags list, creating it if absent)"
                value:
                  createTargetIfMissing: true
                  operation: "append"
                  target: "tags"
                  targetType: "frontmatter"
                  value:
                    - "project/active"
              appendToBlock:
                summary: "Append text to a block addressed by its reference id"
                value:
                  content: "More detail for this block."
                  operation: "append"
                  target: "2c7cfa"
                  targetType: "block"
              appendUnderHeading:
                summary: "Append text below a heading"
                value:
                  content: "Hello"
                  operation: "append"
                  target:
                    - "Heading 1"
                    - "Subheading 1:1:1"
                  targetType: "heading"
              moveSection:
                summary: "Move a heading section under a new parent"
                value:
                  destination:
                    parent:
                      - "Appendix"
                    place: "last"
                  operation: "replace"
                  scope: "parent"
                  target:
                    - "Overview"
                    - "Details"
                  targetType: "heading"
              setFrontmatter:
                summary: "Set a frontmatter field to a JSON value"
                value:
                  operation: "replace"
                  target: "alpha"
                  targetType: "frontmatter"
                  value: 2
            schema:
              "$ref": "#/components/schemas/PatchInstruction"
          "application/vnd.olrapi.patch-instruction+json":
            schema:
              "$ref": "#/components/schemas/PatchInstruction"
          text/markdown:
            schema:
              example: |
                - A raw markdown line, spliced verbatim: no JSON escaping needed.
              type: "string"
        description: |
          Instruction mode: a single patch instruction as JSON (`application/json`, or
          `application/vnd.olrapi.patch-instruction+json` to declare it explicitly).
          Raw-content mode: the raw payload — a `text/markdown` body is the instruction's
          `content` carrier, an `application/json` body its `value` carrier, and no body at
          all carries nothing (a delete, or a move via the `Destination` header). An empty
          raw-mode body never clears content: a `replace` without a payload is rejected as a
          missing carrier, so an accidentally-empty template cannot wipe a section (use an
          instruction body with `"content": ""` to clear deliberately).
        required: false
      responses:
        "200":
          description: "Success. The body is the patched document. Any advisory warnings (e.g. a heading rebased past level 6) are JSON-encoded, then percent-encoded, in the `Markdown-Patch-Warnings` response header."
          headers:
            Content-Location:
              description: "Vault-relative path of the file that was acted on, e.g. `notes/file.md`. Non-ASCII characters are percent-encoded."
              schema:
                example: "notes/file.md"
                type: "string"
        "400":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: "Bad Request; the instruction was malformed, the operation×scope×targetType combination is not part of the algebra, the `Markdown-Patch-Version` header was invalid, an instruction-mode request had a non-object body, or a raw-content-mode header could not be decoded (a heading `Target` that is not percent-encoded JSON, a malformed `Destination`, an unsupported body content type). Header-based targeting without an explicit `Markdown-Patch-Version` returns `PatchHeaderTargetingRequiresExplicitVersion` here. See response message for details."
        "404":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: "The file, or the addressed target within it, does not exist (and `createTargetIfMissing` was not set)."
        "405":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: |
            Your path references a directory instead of a file; this request method is valid only for updating files.
        "409":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: "`rejectIfContentPreexists` was set and the content already appears in the target span."
        "412":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: "Precondition Failed: the `ifMatch` token did not match the current document version; the file was not modified."
        "422":
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
          description: "Conflicting target specifications: more than one of URL path elements, `Target-Type`/`Target` headers, and an `application/vnd.olrapi.patch-instruction+json` instruction body was supplied."
      summary: |
        Partially update content in the current periodic note for the specified period.
      tags:
        - "Periodic Notes"
    post:
      description: |
        Appends content to the current periodic note for the specified period. Note that this will create the relevant periodic note if necessary.
        
        # Targeting a Sub-part of your Document
        
        You can operate on a specific section of a note instead of the whole file by embedding a target in the URL path, immediately after the note identifier. The first segment after the note is the target type, and the remaining segments address the target:
        
        - `.../heading/My%20Section` targets the section beneath the `My Section` heading — the body content below the heading line.
        - For a nested heading, add one path segment per level: `.../heading/My%20Section/Subsection` targets `Subsection` under `My Section`. Because each level is its own segment, a heading whose text contains `::` (or any other delimiter) needs no escaping.
        - `.../block/abc123` targets the block with reference ID `abc123`.
        - `.../frontmatter/fieldName` targets the `fieldName` frontmatter field.
        
        Percent-encode any segment that contains non-ASCII characters or a literal `/` (e.g. `H%C3%A9llo` for `Héllo`).
        
        If a document has a duplicate sibling heading (the same text repeated under the same parent) or a duplicate block reference ID, only the first occurrence is addressable by its plain text/id. Each later occurrence gets its own address with a non-printable marker suffix appended by the server — fetch the document map (`Accept: application/vnd.olrapi.document-map+json`) and copy that occurrence's key verbatim; don't try to type or reconstruct the marker yourself.
        
        `GET` returns just the addressed section. `PUT` replaces it and `POST` appends to it, with heading levels normalized and separator whitespace managed for you. `PATCH` also accepts a URL target — its raw-content mode — with the operation and other instruction fields in headers (`Operation`, `Target-Scope`, …) and the raw payload as the body. For the full instruction algebra (renames, moves, deletes, typed frontmatter values), see the PATCH documentation.
        
        On `PUT` and `POST`, the `Content-Type` of your request body selects how the payload is interpreted, and not every target accepts both:
        
        - A `text/markdown` body is literal markdown. Valid for `heading` and `block` targets. On a `frontmatter` target it is stored as the field's plain string value.
