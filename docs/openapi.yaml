                    name: "work"
                  - count: 2
                    name: "work/tasks"
              schema:
                properties:
                  tags:
                    items:
                      properties:
                        count:
                          description: "Number of times this tag is used across the vault."
                          type: "number"
                        name:
                          description: "Tag name without the leading `#`."
                          type: "string"
                      type: "object"
                    type: "array"
                type: "object"
          description: "A list of tags with their usage counts."
      summary: |
        Get a list of all tags with metadata.
